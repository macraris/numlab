<path d="M 76,621 L 76,635 L 775,635 L 775,621" stroke="#0b3d91" stroke-width="4" fill="none" stroke-linecap="round"/>
<text x="425.5" y="671" font-family="Segoe UI,Arial,sans-serif" font-size="24" font-weight="700" fill="#0b3d91" text-anchor="middle">7 dita = 70</text>
<path d="M 815,621 L 815,635 L 924,635 L 924,621" stroke="#1b6d3b" stroke-width="4" fill="none" stroke-linecap="round"/>
<text x="869.5" y="671" font-family="Segoe UI,Arial,sans-serif" font-size="24" font-weight="700" fill="#1b6d3b" text-anchor="middle">2 dita = 2</text>
