  <!-- Equation -->
  <rect x="280" y="820" width="440" height="64" rx="14" ry="14" fill="#f4f6fb" stroke="#0b3d91" stroke-width="2"/>
  <text x="500" y="863" font-family="Segoe UI,Arial,sans-serif" font-size="32" font-weight="800" fill="#0b3d91" text-anchor="middle">9 × 8 = 70 + 2 = 72</text>
